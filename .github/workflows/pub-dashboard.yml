name: pub-dashboard

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/pub-dashboard.yml'
      - 'action.yaml'
      - 'main.go'
      - 'main_test.go'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches: [ "main" ]
    paths:
      - '.github/workflows/pub-dashboard.yml'
      - 'action.yaml'
      - 'main.go'
      - 'main_test.go'
      - 'go.mod'
      - 'go.sum'

# Disable permissions for all of the available permissions
permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    name: test
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 #v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: false
      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"
            echo "$unformatted"
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race -v ./...

  pub-dashboard-job:
    runs-on: ubuntu-latest
    name: pub-dashboard
    if: github.event_name != 'pull_request'
    needs: test
    permissions:
      contents: write
    steps:
      - name: run pub-dashboard
        uses: AmosHuKe/pub-dashboard@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_repo: "https://github.com/AmosHuKe/pub-dashboard"
          filename: "Example.md"
          publisher_list: "fluttercandies.com"
          package_list: "extended_image,wechat_assets_picker,flutter_tilt,abccba"
          sort_field: "published"
          sort_mode: "asc"
